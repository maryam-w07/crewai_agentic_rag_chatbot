nutrition_advice_task:
  description: >
    You are given a question from a user: {user_input}.

    Provide clear, simple, and safe nutritional advice specifically for elderly individuals.

    Focus on:
    - Easy-to-understand explanations
    - Practical dietary suggestions
    - General wellness tips (not medical diagnosis)

  expected_output: >
    A helpful and concise response that gives nutritional advice tailored
    to elderly individuals based on the user's question.

  agent: nutrition_expert
